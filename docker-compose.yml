version: '3.8'

services:
  # .NET 8 Web API
  backend:
    build:
      context: ./MuszakBeosztasAPI
      dockerfile: Dockerfile
    container_name: muszak-backend
    ports:
      - "8080:8080"
    environment:
      - ASPNETCORE_URLS=http://+:8080
      - ASPNETCORE_ENVIRONMENT=Development
    # A lokális futtatáshoz a Firebase credential fájlt mountolni kell a konténerbe
    # volumes:
    #   - ./firebase-config.json:/app/firebase-config.json
    # environment:
    #   - GOOGLE_APPLICATION_CREDENTIALS=/app/firebase-config.json

  # React + Vite Frontend NGINX-ben
  frontend:
    build:
      context: ./muszak-beosztas-ui
      dockerfile: Dockerfile
    container_name: muszak-frontend
    ports:
      - "5173:80"
    depends_on:
      - backend
